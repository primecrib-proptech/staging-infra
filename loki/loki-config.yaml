auth_enabled: false

server:
  http_listen_port: 3100

memberlist:
  join_members:
    - loki

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  volume_enabled: true

ruler:
  alertmanager_url: http://alertmanager:9093
