apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: platform-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:5.4.1
          ports:
            - containerPort: 8080
          env:
            - name: ADMINER_DEFAULT_SERVER
              value: proptech-pg-rw.platform-data.svc
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: platform-tools
spec:
  selector:
    app: adminer
  ports:
    - port: 8080
