    - secretKey: username
      remoteRef:
        key: platform/rabbitmq
        property: username
    - secretKey: password
      remoteRef:
        key: platform/rabbitmq
        property: rabbit_password
    - secretKey: erlang-cookie
      remoteRef:
        key: platform/rabbitmq
        property: rabbit_erlang_cookie
---
apiVersion: external-secrets.io/v1beta1
