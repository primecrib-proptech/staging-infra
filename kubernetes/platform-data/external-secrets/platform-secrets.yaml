# ExternalSecrets for platform — keys match init-production-secrets.sh
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: proptech-pg-credentials
  namespace: platform-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: proptech-pg-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: platform/postgres
        property: db_user
    - secretKey: password
      remoteRef:
        key: platform/postgres
        property: postgres_password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: platform-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-credentials
  data:
    - secretKey: password
      remoteRef:
        key: platform/redis
        property: redis_root_password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
