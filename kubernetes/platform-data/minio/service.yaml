apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: platform-data
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    v1.min.io/tenant: proptech-minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: platform-data
spec:
  type: ClusterIP
  ports:
    - port: 9001
      targetPort: 9001
  selector:
    v1.min.io/tenant: proptech-minio
