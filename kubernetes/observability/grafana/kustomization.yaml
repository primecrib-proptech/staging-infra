apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: grafana-datasources
    files:
      - datasources.yaml=datasources-k8s.yaml
  - name: grafana-dashboards-provider
    files:
      - dashboards.yml=../../../grafana/provisioning/dashboards/dashboards.yml
  - name: grafana-dashboard-proptech
    files:
      - proptech-services-overview.json=../../../grafana/provisioning/dashboards/json/proptech-services-overview.json

generatorOptions:
  disableNameSuffixHash: true
