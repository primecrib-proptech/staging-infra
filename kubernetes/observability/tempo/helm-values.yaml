# Ported from tempo/tempo.yaml — S3 backend on MinIO
tempo:
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://kube-prometheus-prometheus.observability.svc:9090/api/v1/write
  retention: 168h
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo
        endpoint: minio.platform-data.svc:9000
        insecure: true
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

persistence:
  enabled: true
  storageClassName: longhorn
  size: 10Gi

serviceMonitor:
  enabled: true
