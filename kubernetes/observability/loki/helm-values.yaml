# Staging: filesystem (from loki/loki-config.yaml). Prod overlay: S3 via MinIO.
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    volume_enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi

gateway:
  enabled: true

monitoring:
  serviceMonitor:
    enabled: true
