# Production app routes
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gateway-prod
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`api.primecrib.app`)
      kind: Rule
      services:
        - name: gateway-service
          namespace: apps-prod
          port: 8008
          sticky:
            cookie:
              name: proptech_gateway_sticky
              secure: true
              httpOnly: true
      middlewares:
        - name: security-headers
        - name: compression
        - name: rate-limit
        - name: retry
        - name: circuit-breaker
        - name: buffering
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: primecrib-app-prod
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`www.primecrib.app`)
      kind: Rule
      services:
        - name: primecrib-app
          namespace: apps-prod
          port: 3000
      middlewares:
        - name: frontend-security-headers
        - name: compression
        - name: rate-limit
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: primecrib-admin-prod
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`admin.primecrib.app`)
      kind: Rule
      services:
        - name: primecrib-admin
          namespace: apps-prod
          port: 3000
      middlewares:
        - name: frontend-security-headers
        - name: compression
        - name: rate-limit
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: primecrib-pitch-prod
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`primecrib.app`)
      kind: Rule
      services:
        - name: primecrib-pitch
          namespace: apps-prod
          port: 3000
      middlewares:
        - name: frontend-security-headers
        - name: compression
  tls:
    certResolver: letsencrypt
