# Infra dashboards — ported from traefik/dynamic/traefik_routers.yml
# Services in platform-data / observability / platform-tools namespaces
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`grafana.cyberstarsng.com`)
      kind: Rule
      services:
        - name: kube-prometheus-grafana
          namespace: observability
          port: 80
      middlewares:
        - name: dashboard-auth
        - name: cache-no-store
        - name: security-headers
        - name: compression
        - name: rate-limit
        - name: retry
        - name: circuit-breaker
        - name: buffering
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`prometheus.cyberstarsng.com`)
      kind: Rule
      services:
        - name: kube-prometheus-prometheus
          namespace: observability
          port: 9090
      middlewares:
        - name: dashboard-auth
        - name: cache-no-store
        - name: security-headers
        - name: compression
        - name: rate-limit
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`vault.cyberstarsng.com`)
      kind: Rule
      services:
        - name: vault
          namespace: platform-data
          port: 8200
          scheme: https
          serversTransport: vault-transport
      middlewares:
        - name: security-headers
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: vault-transport
  namespace: ingress
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
