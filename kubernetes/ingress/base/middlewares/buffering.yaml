apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: buffering
  namespace: ingress
spec:
  buffering:
    maxRequestBodyBytes: 10485760
    memRequestBodyBytes: 2097152
    maxResponseBodyBytes: 10485760
    memResponseBodyBytes: 2097152
    retryExpression: "IsNetworkError() && Attempts() < 3"
