---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proptech-core
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`proptech-api.cyberstarsng.com`)
      kind: Rule
      priority: 1
      services:
        - name: proptech-core-service
          namespace: apps-staging  # NOTE: This will be overridden by environment overlay
          port: 8081
          sticky:
            cookie:
              name: proptech_sticky
              secure: true
              httpOnly: true
      middlewares:
        - name: security-headers
        - name: compression
        - name: rate-limit
        - name: retry
        - name: circuit-breaker
        - name: buffering
  tls:
    certResolver: letsencrypt

---
# APPLICATION ROUTES (ENVIRONMENT-AWARE)
# These are substituted by overlays with correct hostnames and namespaces

# STAGING ROUTES (Applied when ENVIRONMENT=staging)
# Pattern: <displayName>.staging.primecrib.app

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gateway-app
  namespace: ingress
  annotations:
    environment: "staging"  # Will be overridden by production overlay
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`staging.api.primecrib.app`)  # Will be patched for production
      kind: Rule
      services:
        - name: gateway-service
          namespace: apps-staging  # Will be overridden by production overlay
          port: 8008
          sticky:
            cookie:
              name: proptech_gateway_sticky
              secure: true
              httpOnly: true
      middlewares:
        - name: security-headers
        - name: compression
        - name: rate-limit
        - name: retry
        - name: circuit-breaker
        - name: buffering
  tls:
    certResolver: letsencrypt

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: primecrib-app
  namespace: ingress
  annotations:
    environment: "staging"  # Will be overridden by production overlay
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`staging.primecrib.app`)  # Will be patched for production
      kind: Rule
      services:
        - name: primecrib-app
          namespace: apps-staging  # Will be overridden by production overlay
          port: 3000
      middlewares:
        - name: frontend-security-headers
        - name: compression
        - name: rate-limit
        - name: retry
        - name: buffering
  tls:
    certResolver: letsencrypt

