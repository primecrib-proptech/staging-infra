# Ingress Routes Template - Environment-Aware IngressRoute Resources
# This file generates all IngressRoute resources dynamically based on:
#   - ENVIRONMENT variable (staging or production)
#   - Service definitions from ingress-values.yaml
#   - Domain configuration from environment overlay
#
# The hostname pattern is:
#   Staging:     <displayName>.staging.primecrib.app  (e.g., api.staging.primecrib.app)
#   Production:  <displayName>.primecrib.app          (e.g., api.primecrib.app)
#   Infra:       <displayName>.cyberstarsng.com       (unchanged)
#
# Usage: This is processed by Kustomize configMapGenerator + strategic merge patches

---
# INFRASTRUCTURE ROUTES
# These routes are environment-independent (shared dashboards/tools)
#
# Pattern: <service>.cyberstarsng.com

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`grafana.cyberstarsng.com`)
      kind: Rule
      services:
        - name: kube-prometheus-grafana
          namespace: observability
          port: 80
      middlewares:
        - name: dashboard-auth
        - name: cache-no-store
        - name: security-headers
        - name: compression
        - name: rate-limit
        - name: retry
        - name: circuit-breaker
        - name: buffering
  tls:
    certResolver: letsencrypt

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: ingress
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`prometheus.cyberstarsng.com`)
      kind: Rule
      services:
        - name: kube-prometheus-prometheus
          namespace: observability
          port: 9090
      middlewares:
        - name: dashboard-auth
