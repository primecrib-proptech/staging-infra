apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rabbitmq-csp
  namespace: ingress
spec:
  headers:
    contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src *; img-src * data:; font-src * data:;"
