apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingress

# Base configuration
bases:
  - ../../base

# Override environment to production
configMapGenerator:
  - name: ingress-environment
    behavior: merge
    literals:
      - ENVIRONMENT=production

# Strategic Merge Patches to update app service routes for production
patchesStrategicMerge:
  # Production Gateway Route: api.primecrib.app (not staging.api.primecrib.app)
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: gateway-app
    spec:
      routes:
        - match: Host(`api.primecrib.app`)
          kind: Rule
          services:
            - name: gateway-service
              namespace: apps-prod

  # Production App Route: www.primecrib.app (not staging.primecrib.app)
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: primecrib-app
    spec:
      routes:
        - match: Host(`www.primecrib.app`)
          kind: Rule
          services:
            - name: primecrib-app
              namespace: apps-prod

  # Production Admin Route: admin.primecrib.app (not staging.admin.primecrib.app)
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: primecrib-admin
    spec:
      routes:
        - match: Host(`admin.primecrib.app`)
          kind: Rule
          services:
            - name: primecrib-admin
              namespace: apps-prod

  # Production Pitch Route: primecrib.app only (not with www in staging)
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: primecrib-pitch
    spec:
      routes:
        - match: Host(`primecrib.app`)
          kind: Rule
          services:
            - name: primecrib-pitch
              namespace: apps-prod

  # Production Proptech Core: apps-prod namespace
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: proptech-core
    spec:
      routes:
        - match: Host(`proptech-api.cyberstarsng.com`)
          kind: Rule
          priority: 1
          services:
            - name: proptech-core-service
              namespace: apps-prod

