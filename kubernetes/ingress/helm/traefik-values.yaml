# Traefik Helm values — ported from traefik/traefik.yml
deployment:
  replicas: 3
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
          topologyKey: kubernetes.io/hostname

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true

logs:
  general:
    level: INFO
  access:
    enabled: true

metrics:
  prometheus:
    enabled: true
    addEntryPointsLabels: true
    addServicesLabels: true

ingressRoute:
  dashboard:
    enabled: true

# cert-manager handles TLS via IngressRoute tls.certResolver or Certificate CRDs
certificatesResolvers:
  letsencrypt:
    acme:
      email: cyberstarsng@gmail.com
      storage: /data/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: route53

service:
  type: LoadBalancer
  annotations: {}

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

persistence:
  enabled: true
  size: 1Gi
  path: /data

additionalArguments:
  - "--ping=true"
  - "--ping.entrypoint=web"
