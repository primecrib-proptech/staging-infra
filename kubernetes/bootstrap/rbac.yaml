# Namespace-scoped RBAC for platform and application operators
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-data-admin
  namespace: platform-data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-data-admin
  namespace: platform-data
rules:
  - apiGroups: ["", "apps", "batch"]
    resources: ["pods", "services", "configmaps", "secrets", "deployments", "jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups", "scheduledbackups", "poolers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["redis.redis.opstreelabs.in"]
    resources: ["redisreplications", "redissentinels"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rabbitmq.com"]
    resources: ["rabbitmqclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["minio.min.io"]
    resources: ["tenants"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-data-admin
  namespace: platform-data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-data-admin
subjects:
  - kind: ServiceAccount
    name: platform-data-admin
    namespace: platform-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apps-deployer
  namespace: apps-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apps-deployer
  namespace: apps-staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apps-deployer
  namespace: apps-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apps-deployer
subjects:
  - kind: ServiceAccount
    name: apps-deployer
    namespace: apps-staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apps-deployer
  namespace: apps-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apps-deployer
  namespace: apps-prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apps-deployer
  namespace: apps-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apps-deployer
subjects:
  - kind: ServiceAccount
    name: apps-deployer
    namespace: apps-prod
