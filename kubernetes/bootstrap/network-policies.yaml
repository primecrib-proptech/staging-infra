# platform-data: deny all ingress by default, allow apps and tools
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-data-ingress
  namespace: platform-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/environment: staging
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/environment: production
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/layer: tools
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/layer: observability
---
# observability: allow prometheus scrape from same ns; deny external ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-ingress
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/layer: observability
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/layer: ingress
---
# apps-staging: allow ingress from ingress namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apps-staging-ingress
  namespace: apps-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/layer: ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apps-prod-ingress
  namespace: apps-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              primecrib.io/layer: ingress
