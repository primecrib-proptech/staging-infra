name: Build & Push Postgres Image

# Rebuild the custom DB image only when something that affects it changes.
# The app deployment workflow is separate and references the image by tag.
on:
  push:
    branches: [main]
    paths:
      - 'postgres/Dockerfile.postgres'
      - 'postgres/Dockerfile.backup'
      - '.github/workflows/db-image.yml'
  workflow_dispatch:
    inputs:
      pgvector_version:
        description: 'pgvector version to build (e.g. 0.8.0)'
        required: false
        default: '0.8.0'

env:
  REGISTRY: ghcr.io
  PG_MAJOR: "16"
  POSTGIS_VERSION: "3.5"
  PGVECTOR_VERSION: ${{ github.event.inputs.pgvector_version || '0.8.0' }}

jobs:
  build-postgres-image:
    name: Build primecrib-postgres
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Download pgvector source
        run: |
          curl -fsSL \
            https://github.com/pgvector/pgvector/archive/refs/tags/v${{ env.PGVECTOR_VERSION }}.tar.gz \
            -o postgres/pgvector.tar.gz

      - name: Compose image version tag
        id: version
        run: |
          # Tag format: <pg>-<postgis>-<pgvector>-<short-sha>
          # The version triple makes it immediately obvious what's in the image.
          # The SHA ties it back to an exact commit for auditability.
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${{ env.PG_MAJOR }}-${{ env.POSTGIS_VERSION }}-${{ env.PGVECTOR_VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_tag=$VERSION-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Docker metadata — postgres
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres
          tags: |
            type=raw,value=${{ steps.version.outputs.full_tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push primecrib-postgres
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./postgres
          file: ./postgres/Dockerfile.postgres
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            POSTGIS_VERSION=${{ env.POSTGIS_VERSION }}
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
          # Layer cache: reuse builder stage across runs so pgvector compile
          # only re-runs when the version arg or Dockerfile changes.
          cache-from: type=gha,scope=postgres-image
          cache-to: type=gha,mode=max,scope=postgres-image
          # Sign the image digest for supply-chain auditability (optional but recommended)
          provenance: true
          sbom: true

      - name: Docker metadata — backup
        id: meta-backup
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres-backup
          tags: |
            type=raw,value=${{ steps.version.outputs.full_tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push primecrib-postgres-backup
        uses: docker/build-push-action@v5
        with:
          context: ./postgres
          file: ./postgres/Dockerfile.backup
          push: true
          tags: ${{ steps.meta-backup.outputs.tags }}
          labels: ${{ steps.meta-backup.outputs.labels }}
          # Build backup image after postgres image so it can reference the
          # same version. Backup Dockerfile's FROM must use the same tag.
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres:${{ steps.version.outputs.full_tag }}
          cache-from: type=gha,scope=backup-image
          cache-to: type=gha,mode=max,scope=backup-image

      - name: Output image tags for downstream workflows
        run: |
          echo "### 🐘 Postgres image built" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "POSTGRES_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres:${{ steps.version.outputs.full_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "POSTGRES_BACKUP_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres-backup:${{ steps.version.outputs.full_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy DB stack
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << ENDSSH
          
          # Authenticate to GHCR on the manager node
          echo "${{ secrets.GHCR_PAT }}" | \
           docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull both images explicitly on the manager first — this caches them
          # locally and lets us resolve the exact sha256 digest before deploying.
          docker pull ${{ needs.build-postgres-image.outputs.image_tag }}
          docker pull ghcr.io/primecrib-proptech/primecrib-postgres-backup:${{ steps.version.outputs.full_tag }}
          
          # Resolve tags to immutable sha256 digests
          POSTGRES_DIGEST=\$(docker inspect --format='{{index .RepoDigests 0}}' \
           ${{ needs.build-postgres-image.outputs.image_tag }})
          
          BACKUP_DIGEST=\$(docker inspect --format='{{index .RepoDigests 0}}' \
           ghcr.io/primecrib-proptech/primecrib-postgres-backup:${{ steps.version.outputs.full_tag }})
          
          echo "Deploying postgres: \$POSTGRES_DIGEST"
          echo "Deploying backup:   \$BACKUP_DIGEST"
          
          export POSTGRES_IMAGE="\$POSTGRES_DIGEST"
          export POSTGRES_BACKUP_IMAGE="\$BACKUP_DIGEST"
          
           # Pull latest infra config and deploy
          cd /opt/containers/staging-infra \
            && git pull \
            && ./deploy.sh prod
          
          sleep 15
          docker service ls --filter name=primecrib-db_postgres
          rm -f /tmp/docker-stack-db.yml
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
