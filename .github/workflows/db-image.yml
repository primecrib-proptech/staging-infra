name: Build & Push Postgres Image

on:
  push:
    branches: [main]
    paths:
      - 'postgres/Dockerfile.postgres'
      - 'postgres/Dockerfile.backup'
      - '.github/workflows/db-image.yml'
  workflow_dispatch:
    inputs:
      pgvector_version:
        description: 'pgvector version to build (e.g. 0.8.0)'
        required: false
        default: '0.8.0'

env:
  REGISTRY: ghcr.io
  PG_MAJOR: "16"
  POSTGIS_VERSION: "3.5"
  PGVECTOR_VERSION: ${{ github.event.inputs.pgvector_version || '0.8.0' }}

jobs:
  build-postgres-image:
    name: Build primecrib-postgres
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      # FIX #2 — expose full_tag as a job-level output so the deploy job
      # can reference it via needs.build-postgres-image.outputs.full_tag.
      # steps.version.outputs.* is NOT accessible across jobs — only job
      # outputs are; step outputs stay scoped to their own job.
      full_tag: ${{ steps.version.outputs.full_tag }}
      # FIX #5 — expose a single deterministic image reference, not the full
      # multi-line metadata-action output. steps.meta.outputs.tags is
      # newline-separated when multiple tags are defined; passing that to
      # docker pull would fail. We build the tag string explicitly instead.
      image_tag: ${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres:${{ steps.version.outputs.full_tag }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Download pgvector source
        run: |
          curl -fsSL \
            https://github.com/pgvector/pgvector/archive/refs/tags/v${{ env.PGVECTOR_VERSION }}.tar.gz \
            -o postgres/pgvector.tar.gz
          test -s postgres/pgvector.tar.gz || (echo "pgvector tarball is empty or missing" && exit 1)

      - name: Compose image version tag
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${{ env.PG_MAJOR }}-${{ env.POSTGIS_VERSION }}-${{ env.PGVECTOR_VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_tag=$VERSION-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Docker metadata — postgres
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres
          tags: |
            type=raw,value=${{ steps.version.outputs.full_tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push primecrib-postgres
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./postgres
          file: ./postgres/Dockerfile.postgres
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ env.PG_MAJOR }}
            POSTGIS_VERSION=${{ env.POSTGIS_VERSION }}
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
          cache-from: type=gha,scope=postgres-image
          cache-to: type=gha,mode=max,scope=postgres-image
          provenance: true
          sbom: true

      - name: Docker metadata — backup
        id: meta-backup
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres-backup
          tags: |
            type=raw,value=${{ steps.version.outputs.full_tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push primecrib-postgres-backup
        uses: docker/build-push-action@v5
        with:
          context: ./postgres
          file: ./postgres/Dockerfile.backup
          push: true
          tags: ${{ steps.meta-backup.outputs.tags }}
          labels: ${{ steps.meta-backup.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres:${{ steps.version.outputs.full_tag }}
          cache-from: type=gha,scope=backup-image
          cache-to: type=gha,mode=max,scope=backup-image

      - name: Output image tags for downstream workflows
        run: |
          echo "### Postgres image built" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "POSTGRES_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres:${{ steps.version.outputs.full_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "POSTGRES_BACKUP_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/primecrib-postgres-backup:${{ steps.version.outputs.full_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  deploy-db-stack:
    name: Deploy DB stack to Swarm
    runs-on: ubuntu-latest
    needs: build-postgres-image
    # FIX #1 — was 'master' but the push trigger above is 'main'.
    # These must match or the deploy job is always skipped.
    if: github.ref_name == 'main'
    environment:
      name: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy DB stack
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            POSTGRES_IMAGE="${{ needs.build-postgres-image.outputs.image_tag }}" \
            BACKUP_TAG="${{ needs.build-postgres-image.outputs.full_tag }}" \
            GHCR_PAT="${{ secrets.GHCR_PAT }}" \
            GITHUB_ACTOR="${{ github.actor }}" \
            REGISTRY="${{ env.REGISTRY }}" \
            REPO_OWNER="${{ github.repository_owner }}" \
            bash << 'ENDSSH'
          set -euo pipefail

          # Login to GitHub Container Registry
          echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          
          docker pull "$POSTGRES_IMAGE"
          docker pull "$REGISTRY/$REPO_OWNER/primecrib-postgres-backup:$BACKUP_TAG"

          POSTGRES_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$POSTGRES_IMAGE")
          BACKUP_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "$REGISTRY/$REPO_OWNER/primecrib-postgres-backup:$BACKUP_TAG")

          echo "Deploying postgres: $POSTGRES_DIGEST"
          echo "Deploying backup:   $BACKUP_DIGEST"

          export POSTGRES_IMAGE="$POSTGRES_DIGEST"
#          export POSTGRES_BACKUP_IMAGE="$BACKUP_DIGEST"
          export POSTGRES_BACKUP_IMAGE="$REGISTRY/$REPO_OWNER/primecrib-postgres-backup:$BACKUP_TAG"

          ./deploy.sh prod
          ENDSSH


      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
