version: "3.9"

services:

# HAProxy is used to route traffic to the Traefik service.: SET server-template traefik 10
  haproxy:
    image: haproxy:3.0
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    networks:
      - traefik-public
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager

  traefik:
    image: traefik:v3.6.13
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic/traefik_middlewares.yml:/etc/traefik/dynamic/traefik_middlewares.yml:ro
      - ./traefik/dynamic/traefik_routers_${ENVIRONMENT:-staging}.yml:/etc/traefik/dynamic/traefik_routers.yml:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    secrets:
      - traefik_basicauth
    networks:
      - traefik-public
      - shared-network
    environment:
      - TZ=UTC
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      endpoint_mode: dnsrr
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"

  portainer:
    image: portainer/portainer-ce:2.39.4-alpine
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - backend
      - traefik-public
      - shared-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"

  postgres:
    image: ${POSTGRES_IMAGE:-ghcr.io/primecrib-proptech/primecrib-postgres:16-3.5-0.8.0}
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      TZ: Africa/Lagos
      PGTZ: Africa/Lagos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./postgres/init.sql.template:/docker-entrypoint-initdb.d/init.sql.template:ro
      - ./postgres/postgresql.conf.custom:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    secrets:
      - db_name
      - db_user
      - db_password
      - postgres_password
      - db_ro_password
      - db_app_password
      - db_api_password
      - db_migration_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      update_config:
        # Postgres is stateful; stop the old task before starting the new one.
        # Never run two postgres replicas simultaneously against the same data dir.
        order: stop-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        order: stop-first
        failure_action: pause
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d $$(cat /run/secrets/db_name)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # Give initdb time to complete before health checks count

  # Build image first: docker build -t postgres-backup:latest -f postgres/Dockerfile.backup postgres/
  postgres-backup:
    image: ${POSTGRES_BACKUP_IMAGE:-ghcr.io/primecrib-proptech/primecrib-postgres-backup:16-3.5-0.8.0}
    volumes:
      - ./postgres/pg_backup.sh:/usr/local/bin/pg_backup.sh:ro
      - postgres_backup_data:/var/backups/postgres
    secrets:
      - db_name
      - db_user
      - postgres_password
      - minio_root_password
      - postgres_backup_encryption_pass
    networks:
      - backend
    environment:
      - TZ=UTC
      - LOG_FILE=/var/backups/postgres/pg_backup.log
    deploy:
      replicas: 0
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  rabbitmq:
    image: rabbitmq:4.2.0-management
    hostname: rabbitmq
    command: >
      sh -c "export RABBITMQ_DEFAULT_USER=admin &&
             export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/rabbit_password) &&
             export RABBITMQ_ERLANG_COOKIE=$$(cat /run/secrets/rabbit_erlang_cookie) &&
             exec rabbitmq-server"
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq
      RABBITMQ_NODENAME: rabbit@rabbitmq
      RABBITMQ_USE_LONGNAME: "false"
      # Tell Erlang VM to use 1 scheduler thread (matches 1.0 CPU limit)
      # Prevents it from probing/spawning schedulers for unavailable CPUs
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+S 1:1 +stbt db"
    secrets:
      - rabbit_password
      - rabbit_erlang_cookie
      - traefik_basicauth
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - backend
      - traefik-public
    healthcheck:
      test: [ "CMD-SHELL", "RABBITMQ_ERLANG_COOKIE=$$(cat /run/secrets/rabbit_erlang_cookie) rabbitmq-diagnostics check_port_connectivity" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 400s
    stop_grace_period: 90s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 450s
      placement:
        constraints: [node.role == manager]
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "0.25"
          memory: 512M
    labels:
      - "traefik.enable=true"

