global
    log stdout format raw local0
    maxconn 50000

defaults
    mode tcp
    log global
    option tcplog
    option tcpka
    timeout connect 5s
    timeout client 5m
    timeout server 5m
    retries 3

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-node
    stats show-legends
    stats hide-version

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout retry 1s
    timeout resolve 1s
    hold valid 10s
    accepted_payload_size 8192

frontend fe_http
    bind *:80
    default_backend be_traefik_http
    mode http

frontend fe_https
    bind *:443
    default_backend be_traefik_https

backend be_traefik_http
    mode http
    balance roundrobin
    option tcp-check
    default-server inter 2s fall 3 rise 2 resolvers docker resolve-prefer ipv4
    server-template traefik 10 tasks.traefik:80 check init-addr libc,none

backend be_traefik_https
    mode tcp
    balance roundrobin
    option tcp-check
    default-server inter 2s fall 3 rise 2 resolvers docker resolve-prefer ipv4
    server-template traefik 10 tasks.traefik:443 check init-addr libc,none
