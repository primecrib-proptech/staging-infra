# Require password from secret
requirepass "$(cat /run/secrets/redis_root_password)"

# Enable AOF for durability
appendonly yes
appendfilename "appendonly.aof"
dir /data

# Optional: Redis persistence settings
save 900 1
save 300 10
save 60 10000

# Bind to all interfaces
bind 0.0.0.0
protected-mode yes

# Adjust max memory policy
maxmemory 2gb
maxmemory-policy allkeys-lru
