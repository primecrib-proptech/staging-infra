# Password is injected at runtime by service command using Docker secret.
# (redis.conf is not shell-evaluated, so command substitution cannot be used here.)

# Enable AOF for durability
appendonly yes
appendfilename "appendonly.aof"
dir /data

# Optional: Redis persistence settings
save 900 1
save 300 10
save 60 10000

# Bind to all interfaces
bind 0.0.0.0
protected-mode yes

# Adjust max memory policy
maxmemory 2gb
maxmemory-policy allkeys-lru

# --- Cluster-ready defaults (kept disabled for single-node runtime) ---
# Turn on when migrating to real Redis Cluster:
# - cluster-enabled yes
# - deploy as distinct nodes with stable identities and ports
cluster-enabled no
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-require-full-coverage no
