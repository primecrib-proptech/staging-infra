http:
  routers:
    traefik-dashboard:
      rule: Host(`traefik.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: api@internal
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders

    vault-dashboard:
      rule: Host(`vault.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: vault-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders

    rabbit-dashboard:
      rule: Host(`rabbit.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: rabbit-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
#        - securityHeaders
        - compression
        - rateLimit
        - retry
        - buffering
        - rabbitmq-csp

    minio-dashboard:
      rule: Host(`minio.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: minio-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    prometheus-dashboard:
      rule: Host(`prometheus.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: prometheus-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    grafana-dashboard:
      rule: Host(`grafana.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: grafana-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    proptech-core-service:
      rule: Host(`proptech-api.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: proptech-core-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

  services:

    rabbit-service:
      loadBalancer:
        servers:
          - url: "http://rabbitmq:15672"

    minio-service:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

    vault-service:
      loadBalancer:
        serversTransport: vaultTransport
        servers:
          - url: "http://vault:8200"

    prometheus-service:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"

    grafana-service:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    proptech-core-service:
      loadBalancer:
        servers:
          - url: "http://proptech_api:8081"
        sticky:
          cookie:
            name: "proptech_sticky"
            secure: true
            httpOnly: true


  serversTransports:
    vaultTransport:
      insecureSkipVerify: true

tcp:
  routers:
    vault-tcp:
      entryPoints:
        - websecure
      rule: "HostSNI(`vault.cyberstarsng.com`)"  # Required for TLS
      service: vault-tcp
      tls:
        passthrough: true

  services:
    vault-tcp:
      loadBalancer:
        servers:
          - address: "vault:8200"