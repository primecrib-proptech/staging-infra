http:
  routers:
    traefik-dashboard:
      rule: Host(`traefik.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: api@internal
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders
        - compression

    vault-dashboard:
      rule: Host(`vault.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: vault-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering
        - inflightreq

    rabbit-dashboard:
      rule: Host(`rabbit.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: rabbit-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering
        - inflightreq

    minio-dashboard:
      rule: Host(`minio.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: minio-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering
        - inflightreq

    proptech-core-service:
      rule: Host(`proptech-api.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: proptech-core-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering
        - inflightreq
        - proptech-api-prefix
        - strip-api-prefix

  services:

    rabbit-service:
      loadBalancer:
        servers:
          - url: "http://rabbitmq:15672"

    minio-service:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

    vault-service:
      loadBalancer:
        servers:
          - url: "http://vault:8200"

    proptech-core-service:
      loadBalancer:
        servers:
          - url: "http://proptech_api:8081"
        sticky:
          cookie:
            name: "proptech_sticky"
            secure: true
            httpOnly: true

tcp:
  routers:
    redis:
      entryPoints:
        - redis
      rule: "HostSNI(`redis.cyberstarsng.com`)"  # Required for TLS
      service: redis-tcp
      tls:
        passthrough: true

  services:
    redis-tcp:
      loadBalancer:
        servers:
          - address: "redis:6379"
