http:
  routers:
    traefik-dashboard:
      rule: Host(`traefik.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: api@internal
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders

    vault-dashboard:
      rule: Host(`vault.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: vault-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders

    rabbit-dashboard:
      rule: Host(`rabbit.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: rabbit-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - compression
        - rateLimit
        - retry
        - buffering
        - rabbitmq-csp

    minio-dashboard:
      rule: Host(`minio.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: minio-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    minio-s3:
      rule: Host(`minio.s3.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: minio-s3-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    prometheus-dashboard:
      rule: Host(`prometheus.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: prometheus-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    grafana-dashboard:
      rule: Host(`grafana.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: grafana-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    portainer-dashboard:
      rule: Host(`portainer.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: portainer-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    adminer-dashboard:
      rule: Host(`adminer.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: adminer-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders
        - compression

    redis-insight-dashboard:
      rule: Host(`redis-insight.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: redis-insight-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders
        - compression

    proptech-core-service:
      rule: Host(`proptech-api.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: proptech-core-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    proptech-gateway-service:
      rule: Host(`staging.api.primecrib.app`)
      entryPoints:
        - websecure
      service: proptech-gateway-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    proptech-admin:
      rule: Host(`staging.admin.primecrib.app`)
      entryPoints:
        - websecure
      service: proptech-admin-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - frontendSecurityHeaders
        - compression
        - rateLimit
        - retry
        - buffering

  services:
    rabbit-service:
      loadBalancer:
        servers:
          - url: "http://rabbitmq:15672"

    minio-service:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

    minio-s3-service:
      loadBalancer:
        servers:
          - url: "http://minio:9000"

    vault-service:
      loadBalancer:
        serversTransport: vaultTransport
        servers:
          - url: "https://vault:8200"

    prometheus-service:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"

    grafana-service:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    portainer-service:
      loadBalancer:
        servers:
          - url: "http://portainer:9000"

    adminer-service:
      loadBalancer:
        servers:
          - url: "http://adminer:8080"

    redis-insight-service:
      loadBalancer:
        servers:
          - url: "http://redis-insight:5540"

    proptech-core-service:
      loadBalancer:
        servers:
          - url: "http://proptech_api:8081"
        sticky:
          cookie:
            name: "proptech_sticky"
            secure: true
            httpOnly: true

    proptech-gateway-service:
      loadBalancer:
        servers:
          - url: "http://proptech_gateway:8008"
        sticky:
          cookie:
            name: "proptech_gateway_sticky"
            secure: true
            httpOnly: true

    proptech-admin-service:
      loadBalancer:
        servers:
          - url: "http://proptech_admin:3000"
        sticky:
          cookie:
            name: "proptech_admin_sticky"
            secure: true
            httpOnly: true


  serversTransports:
    vaultTransport:
      insecureSkipVerify: true

tcp:
  routers:
    vault-tcp:
      entryPoints:
        - websecure
      rule: "HostSNI(`vault.cyberstarsng.com`)"  # Required for TLS
      service: vault-tcp
      tls:
        passthrough: true
    minio-tcp:
      entryPoints:
        - websecure
      rule: "HostSNI(`minio.s3.cyberstarsng.com`)"  # Required for TLS
      service: minio-tcp
      tls:
        passthrough: true
    rabbit-tcp:
      entryPoints:
        - websecure
      rule: "HostSNI(`rabbitmq.cyberstarsng.com`)"  # Required for TLS
      service: rabbit-tcp
      tls:
        passthrough: true

  services:
    minio-tcp:
      loadBalancer:
        servers:
          - address: "minio:9000"
    rabbit-tcp:
      loadBalancer:
        servers:
          - address: "rabbitmq:5672"
