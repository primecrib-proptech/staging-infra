http:
  routers:
    traefik-dashboard:
      rule: Host(`traefik.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: api@internal
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - dashboard-auth
        - securityHeaders

    vault-dashboard:
      rule: Host(`vault.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: vault-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    rabbit-dashboard:
      rule: Host(`rabbit.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: rabbit-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - buffering

    minio-dashboard:
      rule: Host(`minio.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: minio-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

    proptech-core-service:
      rule: Host(`proptech-api.cyberstarsng.com`)
      entryPoints:
        - websecure
      service: proptech-core-service
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - securityHeaders
        - compression
        - rateLimit
        - retry
        - circuitBreaker
        - buffering

  services:

    rabbit-service:
      loadBalancer:
        servers:
          - url: "http://rabbitmq:15672"

    minio-service:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

    vault-service:
      loadBalancer:
        servers:
          - url: "http://vault:8200"

    proptech-core-service:
      loadBalancer:
        servers:
          - url: "http://proptech_api:8081"
        sticky:
          cookie:
            name: "proptech_sticky"
            secure: true
            httpOnly: true

tcp:
  routers:
    vault:
      entryPoints:
        - vault
      rule: "HostSNI(`vault.cyberstarsng.com`)"  # Required for TLS
      service: vault-tcp
      tls:
        passthrough: false

  services:
    vault-tcp:
      loadBalancer:
        servers:
          - address: "vault:8200"