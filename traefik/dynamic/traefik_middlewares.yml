# traefik_middlewares.yml
http:
  middlewares:

    auth:
      basicAuth:
        usersFile: /run/secrets/traefik_basicauth
    whitelist:
      ipWhiteList:
        sourceRange:
          - "10.0.0.0/8"
          - "127.0.0.1/32"
          - "45.130.104.193"
    vault-auth:
      basicAuth:
        usersFile: /run/secrets/traefik_basicauth
    vault-whitelist:
      ipWhiteList:
        sourceRange:
          - "10.0.0.0/8"
          - "127.0.0.1/32"
          - "45.130.104.193"
    rabbit-auth:
      basicAuth:
        usersFile: /run/secrets/traefik_basicauth
    rabbit-whitelist:
      ipWhiteList:
        sourceRange:
          - "10.0.0.0/8"
          - "127.0.0.1/32"
          - "45.130.104.193"
    # Redirect HTTP → HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
        port: "443"

    # Security headers
    securityHeaders:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true # to be true after certs are issued
        frameDeny: true
        sslRedirect: true # to be true after certs are issued
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "geolocation=(), microphone=(), camera=()"

    # Rate Limiting
    rateLimit:
      rateLimit:
        average: 20
        period: 1s
        burst: 50

    # Compression
    compression:
      compress:
        excludedContentTypes:
          - text/event-stream
          - application/grpc
        minResponseBodyBytes: 1024

    # IP Whitelist (for dashboard)
    ipwhitelist:
      ipWhiteList:
        sourceRange:
          - "127.0.0.1/32"
          - "45.130.104.193" #/32"  # Your trusted IP
        ipStrategy:
          depth: 1

    # Retry
    retry:
      retry:
        attempts: 3
        initialInterval: "100ms"

    # Circuit Breaker
    circuitBreaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.5 || ResponseCodeRatio(500, 600, 0, 600) > 0.3"
        checkPeriod: "10s"
        fallbackDuration: "30s"
        recoveryDuration: "10s"

    # Buffering
    buffering:
      buffering:
        maxRequestBodyBytes: 10485760  # 10MB
        memRequestBodyBytes: 2097152   # 2MB
        maxResponseBodyBytes: 10485760 # 10MB
        memResponseBodyBytes: 2097152  # 2MB
        retryExpression: "IsNetworkError() && Attempts() < 3"

    # In-flight Requests
    inflightreq:
      inFlightReq:
        amount: 100
        sourceCriterion:
          ipStrategy:
            depth: 1

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - CurveP521
        - CurveP384
      sniStrict: false

    modern:
      minVersion: VersionTLS13
      sniStrict: false
