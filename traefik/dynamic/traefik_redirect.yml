http:
  routers:
    http-to-https:
      entryPoints: ["web"]
      rule: "HostRegexp(`{host:.+}`)"
      middlewares: ["redirect-to-https"]
      service: "noop-service"
      tls: false
      priority: 1

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    noop-service:
      loadBalancer:
        servers:
          - url: "http://0.0.0.0"
