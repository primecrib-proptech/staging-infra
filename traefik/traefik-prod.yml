# traefik-prod.yml - Production HA Configuration
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# API and Dashboard
api:
  dashboard: true
  insecure: false  # Only accessible over HTTPS

# Entry Points
entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
      insecure: false
      trustedIPs:
        - "127.0.0.1/32"
        - "10.0.0.0/8"

  websecure:
    address: ":443"
    forwardedHeaders:
      insecure: false
      trustedIPs:
        - "127.0.0.1/32"
        - "10.0.0.0/8"
    http:
      tls:
        options: default

# Enable ping for health checks
ping:
  entryPoint: web

# Certificate Resolvers
certificatesResolvers:
  letsencrypt:
    acme:
      email: cyberstarsng@gmail.com
      storage: /letsencrypt/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      keyType: RSA4096
      httpChallenge:
        entryPoint: web
      dnsChallenge:
        provider: route53
        delayBeforeCheck: 0

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-public
    watch: true
    swarmMode: true
    defaultRule: "Host(`{{ normalize .Name }}.cyberstarsng.com`)"

  file:
    directory: /etc/traefik/dynamic
    watch: true

# Logging
log:
  level: INFO
  format: json
  filePath: "" # log to stdout; rely on Docker logging

accessLog:
  format: json
  filePath: /var/log/traefik/access.log
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599"
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        X-Forwarded-Host: keep
        X-Real-Ip: keep
        X-Forwarded-Proto: keep
        Authorization: drop
        Cookie: drop

metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
