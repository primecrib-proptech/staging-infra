# Global Configuration
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# API and Dashboard
api:
  dashboard: true
  insecure: false  # Never expose insecurely in production

# Entry Points
entryPoints:
  web:
    address: ":80"
#    http:
#      redirections:
#        entryPoint:
#          to: websecure
#          scheme: https
#          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        # Disable strict SNI during initial certificate acquisition
        options: default

# Enable ping for health checks
ping:
  entryPoint: web

# Certificate Resolvers
certificatesResolvers:
  letsencrypt:
    acme:
      email: cyberstarsng@gmail.com  # Use devops/noreply email
      storage: acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      keyType: RSA4096
      httpChallenge:
        entryPoint: web

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-public
#    swarmMode: true
#    swarmModeRefreshSeconds: 15
    watch: true
    defaultRule: "Host(`{{ normalize .Name }}.cyberstarsng.com`)"
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Logging
log:
  level: DEBUG  # Use ERROR or WARN in production
  format: json
  filePath: /var/log/traefik/traefik.log
  maxSize: 100
  maxBackups: 3
  maxAge: 7
  compress: true
  noColor: true

accessLog:
  format: json
  filePath: /var/log/traefik/access.log
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599"
    retryAttempts: true
    minDuration: "10ms"
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        X-Real-Ip: keep
        X-Forwarded-Proto: keep

metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# Metrics (Optional but recommended)
#metrics:
