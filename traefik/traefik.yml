# traefik.yml
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# API and Dashboard
api:
  dashboard: true
  insecure: false  # Only accessible over HTTPS

# Entry Points
entryPoints:
  web:
    address: ":80"
    proxyProtocol:
      trustedIPs:
        - "10.0.3.0/24"   # docker network inspect traefik-public --format '{{json .IPAM.Config}}'
    forwardedHeaders:
      insecure: true
      trustedIPs:
        - "0.0.0.0/0"

  websecure:
    address: ":443"
    proxyProtocol:
      trustedIPs:
        - "10.0.3.0/24"
    forwardedHeaders:
      insecure: true
      trustedIPs:
        - "0.0.0.0/0"
    http:
      tls:
        options: default  # Use TLS options from dynamic config

# Enable ping for health checks
ping:
  entryPoint: web

# Certificate Resolvers
certificatesResolvers:
  letsencrypt:
    acme:
      email: primecribtechnology@gmail.com
      storage: /letsencrypt/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      keyType: RSA4096
      # Use TLS-ALPN challenge so certificates can be validated over 443
      # This avoids HTTP-01 failures when port 80 is not reachable end-to-end.
      tlsChallenge: {}

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-public
    watch: true
    defaultRule: "Host(`{{ normalize .Name }}.primecrib.app`)"

  file:
    directory: /etc/traefik/dynamic
    watch: true

# Logging
log:
  level: INFO  # Change to DEBUG only for troubleshooting
  format: json
  filePath: "" # log to stdout; rely on Docker logging

accessLog:
  format: json
  filePath: /var/log/traefik/access.log
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599"
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        X-Forwarded-Host: keep
        X-Real-Ip: keep
        X-Forwarded-Proto: keep

metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
