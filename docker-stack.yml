version: "3.9"

services:

  traefik:
    image: traefik:v3.2
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_logs:/var/log/traefik
    secrets:
      - traefik_basicauth
    networks:
      - traefik-public
    environment:
      - TZ=UTC
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
          - node.role == manager
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.cyberstarsng.com`)"
        - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
        - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.routers.traefik-dashboard.service=api@internal"
#        - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth@file,dashboard-whitelist@file,securityHeaders@file"
        - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth@file,securityHeaders@file"

  postgres:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./postgres/init.sql.template:/docker-entrypoint-initdb.d/init.sql.template:ro
      - ./postgres/postgresql.conf.custom:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    secrets:
      - db_name
      - db_user
      - db_password
      - postgres_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d $$(cat /run/secrets/db_name)"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.21
    command: ["server"]
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_LOCAL_CONFIG: >-
        ui = true
        disable_mlock = true

        api_addr = "http://vault:8200"
        cluster_addr = "http://vault:8201"

        listener "tcp" {
          address     = "0.0.0.0:8200"
          tls_disable = 1
        }

        storage "raft" {
          path    = "/vault/data"
          node_id = "vault"
        }
    volumes:
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - vault_logs:/vault/logs
      - vault_data:/vault/data
      - /srv/vault/data:/vault/data
      - /srv/vault/logs:/vault/logs
    cap_add:
      - IPC_LOCK
    networks:
      - traefik-public
      - backend
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      placement:
        constraints:
          - node.role == manager
    labels:
      - "traefik.enable=true"

  rabbitmq:
    image: rabbitmq:4.2.0-management
    command: >
      sh -c "export RABBITMQ_DEFAULT_USER=admin &&
             export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/rabbit_password) &&
             exec rabbitmq-server"
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq
    secrets:
      - rabbit_password
      - traefik_basicauth
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - backend
      - traefik-public
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
    labels:
      - "traefik.enable=true"
#      - "traefik.http.routers.rabbitmq-ui.middlewares=rabbit-auth@file,rabbit-whitelist@file,securityHeaders@file"
      - "traefik.http.routers.rabbitmq-ui.middlewares=rabbit-auth@file,securityHeaders@file"


  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_DEFAULT_BUCKETS: api-bucket
    secrets:
      - minio_root_password
      - traefik_basicauth
    volumes:
      - minio_data:/data
      - minio_config:/root/.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints: [node.role == manager]
    labels:
      - "traefik.enable=true"

  redis:
    image: redis:8.2-alpine
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_root_password
    secrets:
      - redis_root_password
    volumes:
      - redis_data:/data
    networks:
      - backend
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_root_password) ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints: [node.role == manager]

