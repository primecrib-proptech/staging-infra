# ────────────────────────────────
# LOCAL PERSISTENT VOLUMES
# ────────────────────────────────
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/postgres-data

  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/minio-data

  minio_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/minio-config

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/prometheus-data

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/grafana-data

  github-runner-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/github-runner-data

  traefik_letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/traefik-data

  traefik_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/traefik-logs

  traefik_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/traefik-data

  vault_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/vault-data

  vault_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/vault-logs

  rabbitmq_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/rabbitmq-data

networks:
  backend:
    driver: overlay
    internal: true
  traefik-public:
    external: true
  ci-network:
    external: false
    driver_opts:
      encrypted: "true"

secrets:
  db_name:
    external: true
  db_user:
    external: true
  db_password:
    external: true
  vault_root_token:
    external: true
  vault_unseal_key:
    external: true
  jwt_secret_key:
    external: true
  rabbit_password:
    external: true
  minio_root_password:
    external: true
  github_runner_token:
    external: true
  grafana_root_password:
    external: true
