version: "3.9"

services:

  # ────────────────────────────────────────────
  # INGRESS LAYER
  # ────────────────────────────────────────────

  # HAProxy: DSR load balancer for Traefik HA cluster
  # Dynamically discovers Traefik replicas via DNS SRV
  haproxy:
    image: haproxy:3.0
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8404
        published: 8404
        mode: host
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    networks:
      - traefik-public
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg && curl -s http://localhost:8404/stats | grep -q 'Stats'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=8404"
        - "prometheus.io/path=/stats"

  # Traefik: HA reverse proxy cluster (3 replicas)
  # DNSRR mode for true DSR (no VIP)
  traefik:
    image: traefik:v3.6.13
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_logs:/var/log/traefik
    secrets:
      - traefik_basicauth
    networks:
      - traefik-public
      - shared-network
    environment:
      - TZ=UTC
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=8080"
        - "prometheus.io/path=/metrics"
        - "service.name=traefik"

  # ────────────────────────────────────────────
  # MANAGEMENT & ORCHESTRATION
  # ────────────────────────────────────────────

  portainer:
    image: portainer/portainer-ce:2.39.2-alpine
    init: true
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - backend
      - traefik-public
      - shared-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=9000"
        - "service.name=portainer"

  # ────────────────────────────────────────────
  # DATA PERSISTENCE LAYER
  # ────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.5
    init: true
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./postgres/init.sql.template:/docker-entrypoint-initdb.d/init.sql.template:ro
      - ./postgres/postgresql.conf.custom:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    secrets:
      - db_name
      - db_user
      - db_password
      - postgres_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      labels:
        - "prometheus.io/scrape=false"
        - "service.name=postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d $$(cat /run/secrets/db_name)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Build image first: docker build -t postgres-backup:latest -f postgres/Dockerfile.backup postgres/
  postgres-backup:
    image: postgres-backup:latest
    init: true
    volumes:
      - ./postgres/pg_backup.sh:/usr/local/bin/pg_backup.sh:ro
      - postgres_backup_data:/var/backups/postgres
    secrets:
      - db_name
      - db_user
      - postgres_password
      - minio_root_password
      - postgres_backup_encryption_pass
    networks:
      - backend
    environment:
      - TZ=UTC
      - LOG_FILE=/var/backups/postgres/pg_backup.log
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 180s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "service.name=postgres-backup"

  rabbitmq:
    image: rabbitmq:4.2.0-management
    hostname: rabbitmq
    init: true
    command: >
      sh -c "export RABBITMQ_DEFAULT_USER=admin &&
             export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/rabbit_password) &&
             export RABBITMQ_ERLANG_COOKIE=$$(cat /run/secrets/rabbit_erlang_cookie) &&
             exec rabbitmq-server"
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq
      RABBITMQ_NODENAME: rabbit@rabbitmq
      RABBITMQ_USE_LONGNAME: "false"
    secrets:
      - rabbit_password
      - rabbit_erlang_cookie
    configs:
      - source: rabbitmq_conf
        target: /etc/rabbitmq/rabbitmq.conf
        mode: 0644
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "export RABBITMQ_ERLANG_COOKIE=$$(cat /run/secrets/rabbit_erlang_cookie) && rabbitmq-diagnostics ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 90s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 180s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=15692"
        - "prometheus.io/path=/metrics"
        - "service.name=rabbitmq"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    init: true
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_CONSOLE_ADDRESS: ":9001"
      MINIO_BROWSER: "on"
    secrets:
      - minio_root_password
    volumes:
      - minio_data:/data
      - minio_config:/root/.minio
    networks:
      - backend
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=9000"
        - "service.name=minio"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-buckets-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    init: true
    entrypoint: [""]
    command:
      - /bin/sh
      - -ec
      - |
        read -r MINIO_PASSWORD < /run/secrets/minio_root_password
        until mc alias set local http://minio:9000 minioadmin "$$MINIO_PASSWORD"; do
          echo "waiting for minio..."
          sleep 3
        done
        mc mb --ignore-existing local/tempo
        mc mb --ignore-existing local/postgres-backups
        echo "buckets ensured"
    secrets:
      - minio_root_password
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: none
      placement:
        constraints:
          - node.role == manager

  # Redis Master: single instance, Sentinel-ready topology
  redis-master:
    image: redis:8.2-alpine
    init: true
    command: >
      sh -c "exec redis-server /usr/local/etc/redis/redis.conf
      --requirepass \"$$(cat /run/secrets/redis_root_password)\"
      --masterauth \"$$(cat /run/secrets/redis_root_password)\""
    secrets:
      - redis_root_password
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
        mode: 0644
    volumes:
      - redis_master_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_root_password) ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=6379"
        - "service.name=redis-master"

  # Redis Replicas: enable when adding standby nodes
  redis-replica-1:
    image: redis:8.2-alpine
    init: true
    command: >
      sh -c "exec redis-server /usr/local/etc/redis/redis.conf
      --replicaof redis-master 6379
      --requirepass \"$$(cat /run/secrets/redis_root_password)\"
      --masterauth \"$$(cat /run/secrets/redis_root_password)\""
    secrets:
      - redis_root_password
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
        mode: 0644
    volumes:
      - redis_replica_1_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_root_password) ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.labels.redis-replica-1 == true
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=6379"
        - "service.name=redis-replica-1"

  redis-replica-2:
    image: redis:8.2-alpine
    init: true
    command: >
      sh -c "exec redis-server /usr/local/etc/redis/redis.conf
      --replicaof redis-master 6379
      --requirepass \"$$(cat /run/secrets/redis_root_password)\"
      --masterauth \"$$(cat /run/secrets/redis_root_password)\""
    secrets:
      - redis_root_password
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
        mode: 0644
    volumes:
      - redis_replica_2_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_root_password) ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.labels.redis-replica-2 == true
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=6379"
        - "service.name=redis-replica-2"

  # Redis Sentinel: HA failover manager (3 replicas, 1 per node)
  redis-sentinel:
    image: redis:8.2-alpine
    init: true
    command: |
      sh -ec '
      REDIS_PASS=$$(cat /run/secrets/redis_root_password)
      cat > /tmp/sentinel.conf <<EOF
      port 26379
      bind 0.0.0.0
      protected-mode yes
      requirepass $${REDIS_PASS}
      sentinel resolve-hostnames yes
      sentinel announce-hostnames yes
      sentinel monitor mymaster redis-master 6379 2
      sentinel auth-pass mymaster $${REDIS_PASS}
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 60000
      sentinel parallel-syncs mymaster 1
      dir /data
      EOF
      exec redis-server /tmp/sentinel.conf --sentinel
      '
    secrets:
      - redis_root_password
    volumes:
      - redis_sentinel_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -p 26379 -a \"$$(cat /run/secrets/redis_root_password)\" ping | grep -q PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=26379"
        - "service.name=redis-sentinel"

  # ────────────────────────────────────────────
  # SECRETS MANAGEMENT (HA Raft)
  # ────────────────────────────────────────────
  vault-1:
    image: hashicorp/vault:1.21
    init: true
    entrypoint:
      - /vault/scripts/vault-wrapper.sh
    volumes:
      - ./vault/vault-1.hcl:/vault/config/vault.hcl:ro
      - ./vault/cert:/vault/certs:ro
      - ./vault/auto-unseal.sh:/vault/scripts/auto-unseal.sh:ro
      - ./vault/vault-wrapper.sh:/vault/scripts/vault-wrapper.sh:ro
      - vault_1_data:/vault/data
      - vault_1_logs:/vault/logs
    environment:
      VAULT_ADDR: "https://vault-1:8200"
      VAULT_SKIP_VERIFY: "true"
      UNSEAL_KEYS_FILE: "/run/secrets/vault_unseal_key"
    secrets:
      - vault_unseal_key
    networks:
      - backend
      - traefik-public
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "sh", "-c", "vault status 2>/dev/null | grep -q 'Sealed.*false'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=8200"
        - "prometheus.io/path=/v1/sys/metrics"
        - "service.name=vault-1"

  vault-2:
    image: hashicorp/vault:1.21
    init: true
    entrypoint:
      - /vault/scripts/vault-wrapper.sh
    volumes:
      - ./vault/vault-2.hcl:/vault/config/vault.hcl:ro
      - ./vault/cert:/vault/certs:ro
      - ./vault/auto-unseal.sh:/vault/scripts/auto-unseal.sh:ro
      - ./vault/vault-wrapper.sh:/vault/scripts/vault-wrapper.sh:ro
      - vault_2_data:/vault/data
      - vault_2_logs:/vault/logs
    environment:
      VAULT_ADDR: "https://vault-2:8200"
      VAULT_SKIP_VERIFY: "true"
      UNSEAL_KEYS_FILE: "/run/secrets/vault_unseal_key"
    secrets:
      - vault_unseal_key
    networks:
      - backend
      - traefik-public
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "sh", "-c", "vault status 2>/dev/null | grep -q 'Sealed.*false'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=8200"
        - "prometheus.io/path=/v1/sys/metrics"
        - "service.name=vault-2"

  vault-3:
    image: hashicorp/vault:1.21
    init: true
    entrypoint:
      - /vault/scripts/vault-wrapper.sh
    volumes:
      - ./vault/vault-3.hcl:/vault/config/vault.hcl:ro
      - ./vault/cert:/vault/certs:ro
      - ./vault/auto-unseal.sh:/vault/scripts/auto-unseal.sh:ro
      - ./vault/vault-wrapper.sh:/vault/scripts/vault-wrapper.sh:ro
      - vault_3_data:/vault/data
      - vault_3_logs:/vault/logs
    environment:
      VAULT_ADDR: "https://vault-3:8200"
      VAULT_SKIP_VERIFY: "true"
      UNSEAL_KEYS_FILE: "/run/secrets/vault_unseal_key"
    secrets:
      - vault_unseal_key
    networks:
      - backend
      - traefik-public
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "sh", "-c", "vault status 2>/dev/null | grep -q 'Sealed.*false'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=8200"
        - "prometheus.io/path=/v1/sys/metrics"
        - "service.name=vault-3"

  # ────────────────────────────────────────────
  # OBSERVABILITY STACK
  # ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.8.0
    init: true
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=50GB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend
      - traefik-public
      - shared-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=9090"
        - "prometheus.io/path=/metrics"
        - "service.name=prometheus"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:12.1
    init: true
    environment:
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_root_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.cyberstarsng.com
      - GF_SERVER_PROTOCOL=https
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_DATABASE_MAX_IDLE_CONN=10
      - GF_DATABASE_MAX_OPEN_CONN=50
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
      - traefik-public
      - shared-network
      - observability
    secrets:
      - grafana_root_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=3000"
        - "prometheus.io/path=/metrics"
        - "service.name=grafana"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  loki:
    image: grafana/loki:2.9.3
    init: true
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=3100"
        - "prometheus.io/path=/metrics"
        - "service.name=loki"
    networks:
      - backend
      - traefik-public
      - shared-network
      - observability
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  tempo:
    image: grafana/tempo:2.8.2
    init: true
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
      - "-config.expand-env=true"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_BUCKET=tempo
      - MINIO_INSECURE=true
      - AWS_SHARED_CREDENTIALS_FILE=/run/secrets/tempo_s3_credentials
      - AWS_REGION=us-east-1
    secrets:
      - tempo_s3_credentials
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=3200"
        - "prometheus.io/path=/metrics"
        - "service.name=tempo"
    networks:
      - backend
      - shared-network
      - observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  promtail:
    image: grafana/promtail:2.9.3
    init: true
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      labels:
        - "prometheus.io/scrape=true"
        - "prometheus.io/port=9080"
        - "prometheus.io/path=/metrics"
        - "service.name=promtail"
    networks:
      - backend
      - traefik-public
      - shared-network
      - observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────────────────────
  # ADMIN & UTILITY TOOLS
  # ────────────────────────────────────────────
  adminer:
    image: adminer:5.4.1
    init: true
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    networks:
      - traefik-public
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=false"
        - "service.name=adminer"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-insight:
    image: redis/redisinsight:3.0.2
    init: true
    volumes:
      - redisinsight_data:/data
    networks:
      - traefik-public
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=false"
        - "service.name=redis-insight"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5540/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  imgproxy:
    image: darthsim/imgproxy:latest
    init: true
    command: >
      sh -ec '
      export IMGPROXY_KEY="$$(tr -d "\r\n" < /run/secrets/imgproxy_key)";
      export IMGPROXY_SALT="$$(tr -d "\r\n" < /run/secrets/imgproxy_salt)";
      exec imgproxy
      '
    environment:
      AWS_EC2_METADATA_DISABLED: "true"
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: "http://minio:9000"
      IMGPROXY_S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID_FILE: "/run/secrets/minio_access_key"
      AWS_SECRET_ACCESS_KEY_FILE: "/run/secrets/minio_root_password"
      IMGPROXY_S3_USE_PATH_STYLE: "true"
      IMGPROXY_ALLOWED_SOURCES: "s3://proptech-pub/,s3://"
      IMGPROXY_WATERMARK_PATH: /watermarks/logo-96x96.png
      IMGPROXY_MAX_SRC_RESOLUTION: 50
      IMGPROXY_DOWNLOAD_TIMEOUT: 10
      IMGPROXY_WORKERS: 20
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_AUTO_AVIF: "true"
      IMGPROXY_QUALITY: "80"
      IMGPROXY_STRIP: "true"
    secrets:
      - imgproxy_key
      - imgproxy_salt
      - minio_access_key
      - minio_root_password
    configs:
      - source: imgproxy_watermark
        target: /watermarks/logo-96x96.png
    networks:
      - backend
      - traefik-public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "prometheus.io/scrape=false"
        - "service.name=imgproxy"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

# ────────────────────────────────
