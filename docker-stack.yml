version: "3.9"

services:

  traefik:
    image: traefik:v3.6.2
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_logs:/var/log/traefik
    secrets:
      - traefik_basicauth
    networks:
      - traefik-public
      - shared-network
    environment:
      - TZ=UTC
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
          - node.role == manager
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"

  postgres:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./postgres/init.sql.template:/docker-entrypoint-initdb.d/init.sql.template:ro
      - ./postgres/postgresql.conf.custom:/etc/postgresql/postgresql.conf:ro
    networks:
      - traefik-public
      - backend
    secrets:
      - db_name
      - db_user
      - db_password
      - postgres_password
      - minio_root_password
      - postgres_backup_encryption_pass
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user) -d $$(cat /run/secrets/db_name)"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.0-management
    command: >
      sh -c "export RABBITMQ_DEFAULT_USER=admin &&
             export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/rabbit_password) &&
             exec rabbitmq-server"
    ports:
      - "5672"
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq
    secrets:
      - rabbit_password
      - traefik_basicauth
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - backend
      - traefik-public
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
    labels:
      - "traefik.enable=true"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_password
      - traefik_basicauth
    volumes:
      - minio_data:/data
      - minio_config:/root/.minio
    ports:
      - "9000"
    networks:
      - backend
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints: [node.role == manager]
    labels:
      - "traefik.enable=true"

  redis:
    image: redis:8.2-alpine
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_root_password
    secrets:
      - redis_root_password
    volumes:
      - redis_data:/data
    networks:
      - traefik-public
      - backend
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_root_password) ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints: [node.role == manager]

  vault:
    image: hashicorp/vault:1.21
    entrypoint:
      - /vault/scripts/vault-wrapper.sh
    volumes:
      - ./vault/vault.hcl:/vault/config/vault.hcl:ro
      - ./vault/cert:/vault/certs:ro
      - ./vault/auto-unseal.sh:/vault/scripts/auto-unseal.sh:ro
      - ./vault/vault-wrapper.sh:/vault/scripts/vault-wrapper.sh:ro
      - ./vault/unseal-keys.txt:/vault/config/unseal-keys.txt:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      UNSEAL_KEYS_FILE: "/vault/config/unseal-keys.txt"
    networks:
      - traefik-public
      - backend
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "sh", "-c", "vault status | grep -q 'Sealed.*false'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      placement:
        constraints:
          - node.role == manager
    labels:
      - "traefik.enable=true"

  prometheus:
    image: prom/prometheus:v3.8.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend
      - traefik-public
      - shared-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "traefik.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:12.1
    environment:
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_root_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.localhost
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_provisioning:/etc/grafana/provisioning
    networks:
      - backend
      - traefik-public
      - shared-network
      - observability
    secrets:
      - grafana_root_password
      - traefik_basicauth
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
      labels:
        - "traefik.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  portainer:
    image: portainer/portainer-ce:2.33.6-alpine
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - backend
      - traefik-public
      - shared-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"

  adminer:
    image: adminer:5.4.1
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    networks:
      - traefik-public
      - backend
    secrets:
      - traefik_basicauth
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"

  redis-insight:
    image: redis/redisinsight:3.0.2
    networks:
      - traefik-public
      - backend
    secrets:
      - traefik_basicauth
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"

  loki:
    image: grafana/loki:2.9.3
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    networks:
      - backend
      - traefik-public
      - shared-network
      - observability

  promtail:
    image: grafana/promtail:2.9.3
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    networks:
      - backend
      - traefik-public
      - shared-network
      - observability


# ────────────────────────────────
# LOCAL PERSISTENT VOLUMES
# ────────────────────────────────
configs:
  redis_conf:
    file: ./redis/redis.conf

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/postgres-data

  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/minio-data

  minio_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/minio-config

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/prometheus-data

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/grafana-data

  grafana_provisioning:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/grafana-provisioning

  traefik_letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/traefik-letsencrypt-data

  traefik_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/traefik-data

  traefik_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/traefik-logs

  rabbitmq_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/rabbitmq-data

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/redis-data

  vault_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/vault-data

  vault_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/vault-logs

  portainer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/portainer

  loki_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/containers/storages/loki-data

networks:
  backend:
    driver: overlay
    internal: true
  traefik-public:
    driver: overlay
    external: true
  ci-network:
    driver: overlay
    external: false
    driver_opts:
      encrypted: "true"
  shared-network:
    driver: overlay
    external: true
  observability:
    external: true

secrets:
  db_name:
    external: true
  db_user:
    external: true
  db_password:
    external: true
  postgres_password:
    external: true
  vault_root_token:
    external: true
  vault_unseal_key:
    external: true
  vault_connection_url:
    external: true
  jwt_secret_key:
    external: true
  rabbit_password:
    external: true
  minio_root_password:
    external: true
  grafana_root_password:
    external: true
  traefik_basicauth:
    external: true
  redis_root_password:
    external: true
  postgres_backup_encryption_pass:
    external: true