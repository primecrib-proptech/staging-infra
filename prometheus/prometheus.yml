global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Core service actuator metrics
  - job_name: "proptech-core-service"
    metrics_path: "/api/v1/actuator/prometheus"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "api:8081"
          - "proptech_core_service_api:8081"
          - "tasks.api:8081"
          - "tasks.proptech_core_service_api:8081"
        labels:
          service: "proptech-core-service"
          env: "staging"

  # Gateway actuator metrics
  - job_name: "proptech-gateway-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "gateway:8008"
          - "proptech_gateway_service_gateway:8008"
          - "tasks.gateway:8008"
          - "tasks.proptech_gateway_service_gateway:8008"
        labels:
          service: "proptech-gateway-service"
          env: "staging"