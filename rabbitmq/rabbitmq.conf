default_user = admin
default_pass = ${RABBITMQ_DEFAULT_PASS}
loopback_users.guest = false
listeners.tcp.default = 5672
management.listener.port = 15672
management.listener.ip = 0.0.0.0
prometheus.tcp.port = 15692

# Single-node safe — remove all cluster formation until you actually cluster
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_partition_handling = ignore

# Memory: tell Rabbit it has 2GB; flow control at 60% = ~1.2GB
# Docker limit is 2G — this gives Erlang VM ~800MB headroom above watermark
total_memory_available_override_value = 3GB
vm_memory_high_watermark.relative = 0.6

# File descriptors — matches container ulimit

# Suppress deprecated feature warning
deprecated_features.permit.management_metrics_collection = true

# Explicitly tell Erlang how many schedulers to use (avoids probing all 4 CPUs)
# Matches your 1.0 CPU limit
num_acceptors.tcp = 2
