default_user = admin
default_pass = ${RABBITMQ_DEFAULT_PASS}
loopback_users.guest = false
listeners.tcp.default = 5672
management.listener.port = 15672
management.listener.ip = 0.0.0.0
prometheus.tcp.port = 15692

# --- Cluster-ready defaults (safe for single node today) ---
# When scaled, RabbitMQ nodes discover peers via Swarm DNS records.
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_dns
cluster_formation.dns.hostname = tasks.rabbitmq
cluster_formation.dns.record_type = a
cluster_formation.discovery_retry_limit = 10
cluster_formation.discovery_retry_interval = 3000
cluster_formation.node_cleanup.interval = 30
cluster_formation.node_cleanup.only_log_warning = true
cluster_formation.target_cluster_size_hint = 3

# Prefer safety during partitions once clustering is enabled.
cluster_partition_handling = pause_minority

# Keep memory behavior predictable in constrained containers.
vm_memory_high_watermark.relative = 0.6

# Avoid false-positive startup alarm due default low fd limits.
# Container ulimit is configured in stack; this keeps Rabbit expectation explicit.
total_memory_available_override_value = 4GB